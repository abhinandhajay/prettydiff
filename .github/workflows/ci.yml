name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: ".bun-version"

            - name: Verify Bun version
              run: |
                  expected=$(cat .bun-version)
                  actual=$(bun --version)
                  if [ "$actual" != "$expected" ]; then
                    echo "::error::Bun version $actual does not match .bun-version $expected"
                    exit 1
                  fi

            - run: bun install --frozen-lockfile
            - run: bun run format:check
            - run: bun run lint
            - run: bun test
            - run: bun run build
